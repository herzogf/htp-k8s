name: CI

# CI posture for both PRs and push-to-main (issue #1 / ADR-0005, extended by
# issue #95). Renamed from pr.yml -> build.yml when the push-to-main trigger
# was added (issue #95): every commit that lands on `main` now gets its own
# check-runs, which is what makes the release.yml green-commit guard possible
# (a tag can only be cut off a `main` commit that itself has a real, checked
# status — see release.yml). Two tiers (ADR-0004):
#   * Fast, source-level checks — Backend (Go), Frontend (Node) — give quick
#     feedback and are the required status checks on `main`.
#   * Slower, heavier checks added by issue #8 — the kind + KWOK backend
#     integration suite, the Playwright e2e suite, and a Trivy scan of the
#     ko-built container image (CVE findings non-blocking, but a scan
#     *operational* failure fails the check — see #69/#70) — run as their own
#     separate jobs so the fast tier stays fast.
#
# IMPORTANT: the job `name:` fields below are the branch-protection
# required-status-check CONTEXTS (ruleset 18831212 on `main`, see
# docs/agents/findings.md). Never rename a job — a renamed job makes its
# required check permanently pending, which makes every PR unmergeable.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  # Keyed so PR runs and push-to-main runs never share a group (a main push
  # must not cancel — or be cancelled by — an unrelated PR's run), while
  # multiple runs for the SAME PR, or successive pushes to `main`, still
  # cancel their predecessor (only the latest result matters either way).
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Docs-only fast path (issue #76, extended to push-to-main by issue #95). A
  # cheap gate job that reports whether any NON-docs path changed. The three
  # heavy jobs below (integration / e2e / container-scan) are gated on its
  # output so a docs-only PR *or* a docs-only push to `main` skips ~10-15 min
  # of cluster-spinning.
  #
  # DO NOT "simplify" this into `on.pull_request.paths-ignore` / `on.push.paths`.
  # `main` has STRICT required status checks (ruleset 18831212): Backend (Go),
  # Frontend (Node), Backend integration (kind + KWOK), E2E (Playwright),
  # Container scan (Trivy). If a docs change skipped the *workflow* via a
  # paths filter, those required checks would NEVER report and stay "pending"
  # forever -> the PR becomes permanently UN-mergeable (worse than the status
  # quo). So the workflow MUST still trigger on every PR and every push to
  # `main`; we skip only the heavy *jobs* at the job level. A job-level-skipped
  # required check is treated as passing by branch protection (verified on a
  # docs-only test PR for #76), unlike a skipped workflow. On push, this is
  # also what lets a docs-only main commit still resolve as a "green commit"
  # for the release.yml guard (issue #95) — its required checks report
  # `skipped`, and the guard treats that as passing too, matching branch
  # protection's own semantics.
  #
  # "Docs-only" = every changed path is under **/*.md, docs/**, or LICENSE.
  # ANYTHING else runs the full suite: code, web/, config, and especially
  # .github/** (a workflow change must never skip its own validation). A PR
  # touching BOTH docs and code runs everything. The `every` predicate-quantifier
  # makes `nondocs` true iff a file matches `**` AND none of the docs negations,
  # so any non-docs file — and thus any mixed PR — flips it true. (An OR over
  # bare `!` patterns would NOT express this correctly; keep `every`.)
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      # dorny/paths-filter lists the PR's changed files via the GitHub API on
      # pull_request events (no checkout needed), which reads the pulls API.
      pull-requests: read
    outputs:
      nondocs: ${{ steps.filter.outputs.nondocs }}
    steps:
      # dorny/paths-filter needs the repo checked out ONLY for its push-event
      # path (it diffs via local git commands there); the pull_request path
      # uses the GitHub REST API instead and needs no checkout. fetch-depth: 0
      # (full history) so the "base: main" comparison below always has the
      # pre-push commit available to diff against, regardless of how many
      # commits the push/merge introduced.
      - name: Checkout (push-to-main only; PR path uses the GitHub API)
        if: github.event_name == 'push'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect non-docs changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          predicate-quantifier: 'every'
          # Ignored on pull_request events (that path always compares against
          # the PR base branch via the API — see dorny/paths-filter's README).
          # On push, 'main' *is* the branch that was just pushed to, which
          # puts the action in its "long-lived branch" mode: changes are
          # detected against the most recent commit on main *before* this
          # push, i.e. exactly the files the merge/squash commit introduced —
          # the same file set a PR check would have seen for that change.
          base: main
          filters: |
            nondocs:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'

  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # Required to upload the govulncheck SARIF to the GitHub Security tab
      # (issue #143), same grant the Trivy job already carries for the same
      # reason (ADR-0005).
      security-events: write
    env:
      # Shared with the govulncheck step below AND with release.yml's
      # `govulncheck-release` job (issue #143) — one literal so the PR-time
      # and release-time scans can't silently drift to describe different
      # code.
      GOVULNCHECK_PKGS: ./...
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # Pin the Go MINOR explicitly (not go-version-file) so check-latest
          # resolves the newest 1.26.x patch. go.mod's `go` directive is
          # `go 1.26.0` (an exact patch that the k8s.io v0.36 dependency graph
          # forces — bumping it to `go 1.26` is rejected by the module graph),
          # and go-version-file would make setup-go install exactly 1.26.0,
          # which is UNPATCHED — govulncheck would then flag stdlib vulns fixed
          # in later 1.26.x (GO-2026-5856 etc.). Reading the minor here keeps
          # govulncheck scanning against a patched toolchain. Bump this when the
          # project moves to a new Go minor.
          go-version: "1.26"
          check-latest: true

      - name: Set up Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.x
          # Authenticate the go-task release lookup against the GitHub API so it
          # uses the (higher) authenticated rate limit rather than the low
          # anonymous one, which intermittently rate-limited this step before any
          # real work ran (issue #66). GITHUB_TOKEN is already available under the
          # workflow's `contents: read`; no extra permissions needed.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # The frontend TypeScript wire types are generated from the Go SceneState
      # contract (issue #10). Regenerate on a pristine tree and fail on any diff
      # so a Go struct change without a matching regenerate-and-commit can't
      # silently ship mismatched types. Runs here (not the Frontend job) because
      # tygo needs Go. Placed before Build, which itself regenerates.
      - name: Codegen drift check
        run: task codegen:verify

      - name: Build
        run: task build

      - name: Vet
        run: task vet

      - name: Test
        run: task test

      # Source-level CVE scanning is blocking here (unlike the report-only
      # Trivy container scan) per issue #1 and ADR-0005. govulncheck's
      # reachability analysis (only symbols this code actually calls) makes
      # it the highest-signal, lowest-noise of the three Go vuln signals in
      # this repo (Trivy image scan, Dependabot, govulncheck) — worth
      # blocking on (issue #143). SARIF report + Security-tab upload +
      # blocking gate all live in the local `govulncheck` composite action
      # (`.github/actions/govulncheck`) — see its `action.yml` for the full
      # design rationale (why not `-format sarif`'s own exit code, why not
      # the official `golang/govulncheck-action`, the pinned version). This
      # is the PR-time, blocking call (`blocking` defaults to "true"); the
      # release-time call in `release.yml` is report-only and uses a
      # different category — every category in this repo must be unique
      # across ALL SARIF uploads (see the action's `category` input).
      - name: govulncheck
        uses: ./.github/actions/govulncheck
        with:
          pkgs: ${{ env.GOVULNCHECK_PKGS }}
          category: govulncheck

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.x
          # Authenticated go-task release lookup — avoids the anonymous GitHub
          # API rate-limit flake (issue #66). See the Backend job for details.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: task lint

      - name: Build
        run: task build

      - name: Test
        run: task test

      # The ADR-0011 layer-3 video capture harness's pure math (frame-timing,
      # pose-trace analysis, quaternion/yaw — issue #120) has its own small
      # Vitest suite under test/e2e/capture, kept separate from web/'s own
      # `npm test` above because Vite's dev-server file-serving guard refuses
      # to transform test files living outside a project's root (see
      # test/e2e/capture/vitest.config.mjs's comment) — so it gets its own
      # step here rather than folding into the "Test" step above. It reuses
      # web/node_modules (already installed by the steps above) via the same
      # symlink `task capture:record` uses, so no extra install step is
      # needed; it is plain Node math with no browser/cluster involved, so it
      # stays cheap (well under a second) even though it runs on every PR,
      # unlike `task capture:record` itself (never run in CI — see that
      # task's description).
      - name: Capture harness pure-math tests (test/e2e/capture)
        working-directory: test/e2e/capture
        run: task test

      # Source-level CVE scanning is blocking here (unlike the report-only
      # Trivy container scan) per issue #1 and ADR-0005. npm audit's default
      # exit code already fails on any reported vulnerability.
      - name: npm audit
        run: npm audit

  # ---------------------------------------------------------------------------
  # Heavier, second-tier checks (issue #8). Separate jobs so the fast tier
  # above keeps giving quick feedback (ADR-0004).
  # ---------------------------------------------------------------------------

  integration:
    name: Backend integration (kind + KWOK)
    # Skipped on docs-only PRs (issue #76). needs: changes makes this wait for
    # the gate; if: runs it only when a non-docs path changed. A skipped
    # required check counts as passing for branch protection — see the changes
    # job comment. Docs-only PRs stay mergeable with this skipped.
    needs: changes
    if: ${{ needs.changes.outputs.nondocs == 'true' }}
    runs-on: ubuntu-latest
    # kind pulls a node image and boots a real single-node cluster; give it
    # more headroom than the fast jobs. Ran ~45s live in dev (issue #5), but
    # the first-run image pull on a cold runner adds to that.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          check-latest: true

      # The kind + KWOK harness (internal/testcluster, issue #5) needs only
      # Docker — already present on GitHub-hosted ubuntu-latest runners. These
      # tests are gated behind `//go:build integration`, so the fast Backend
      # job's `task test` deliberately does NOT run them; this job does.
      - name: Integration tests (kind + KWOK)
        run: go test -tags=integration ./cmd/... ./internal/...

  e2e:
    name: E2E (Playwright)
    # Skipped on docs-only PRs (issue #76) — see the integration/changes jobs.
    needs: changes
    if: ${{ needs.changes.outputs.nondocs == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Playwright's webServer builds and launches the real single binary via
      # the root `task build` (npm ci + vite build + Go embed + compile), so
      # this job needs Go, Node, and go-task all on PATH (ADR-0001/0004).
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
        with:
          version: 3.x
          # Authenticated go-task release lookup — avoids the anonymous GitHub
          # API rate-limit flake (issue #66). See the Backend job for details.
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      # The `web:e2e` task only runs `playwright install chromium` (browser
      # download). A fresh runner also needs the browser's system libraries,
      # which only `--with-deps` (an apt step) installs — so do it here.
      #
      # This step has intermittently HUNG on a fresh runner (~19 min observed
      # while an identical parallel step passed — an isolated runner transient,
      # not our code; issue #66). Harden it two ways:
      #   * a per-attempt `timeout 240` fails a single hung install fast instead
      #     of letting it burn the runner up to the job timeout;
      #   * a bounded retry loop (3 attempts) auto-recovers from a transient hang
      #     or download blip, and the `exit 1` after the last attempt means a
      #     PERSISTENT failure still fails the job — the flake fix never masks a
      #     real one.
      # `timeout-minutes` is an outer safety net bounding the whole loop (3 ×
      # 240s + backoffs) well under the 30-min job timeout.
      - name: Install Playwright browser + system deps
        working-directory: web
        timeout-minutes: 15
        run: |
          for i in 1 2 3; do
            timeout 240 npx playwright install --with-deps chromium && break
            echo "playwright install attempt $i failed/timed out; retrying"
            sleep 5
            [ "$i" = 3 ] && exit 1
          done

      # ADR-0004: e2e is the genuine full-system check and was always meant to
      # run against a real cluster. Since issue #9 the binary FAILS startup when
      # it cannot reach a Kubernetes cluster, so the app Playwright's webServer
      # launches needs one. Provision a single-node kind cluster (Docker is
      # already present on ubuntu-latest, as the integration job relies on). A
      # fresh kind cluster makes the CI user cluster-admin, so the app detects
      # Node view mode. kubeconfig is written to the default ~/.kube/config.
      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: htp-k8s-e2e

      # Point client-go (via KUBECONFIG) at the kind cluster explicitly and
      # confirm it is reachable before launching the app, so a cluster-provision
      # failure surfaces here rather than as an opaque webServer start failure.
      # Playwright's webServer inherits this process env (see playwright.config).
      - name: Verify cluster is reachable and export KUBECONFIG
        run: |
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
          kubectl cluster-info
          kubectl get nodes

      # Container-behavior coverage for the published image's kubeconfig
      # fallback (issue #113/PR #124). This is the one piece of that change no
      # unit test can reach (internal/kube/client_test.go covers the decision
      # function; this covers the real ko/Chainguard-static image's real
      # non-root process). Reuses THIS job's already-provisioned kind cluster
      # rather than spinning up a redundant one (ADR-0004) — it only needs a
      # real, reachable kubeconfig, which the step above just verified. Runs
      # before KWOK seeding so a regression here fails fast without paying for
      # the seed step first.
      - name: Set up ko
        uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      # Bare build (no frontend embed) is enough here — these checks only need
      # the backend's kubeconfig-loading path, not real UI content. Same
      # rationale as the Container scan (Trivy) job's local image build (see
      # docs/agents/findings.md): the committed placeholder
      # internal/server/dist/index.html lets `ko build --local` succeed without
      # a frontend build.
      - name: Build local container image (ko)
        id: build-fallback-test-image
        env:
          KO_DOCKER_REPO: ko.local
        run: |
          image="$(ko build --local ./cmd/htp-k8s)"
          echo "Built image: ${image}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Container kubeconfig fallback (docker)
        env:
          IMAGE: ${{ steps.build-fallback-test-image.outputs.image }}
          # Must match the `cluster_name` given to helm/kind-action above —
          # this script (issue #127) derives its own internal kubeconfig from
          # it via `kind get kubeconfig --internal --name "$CLUSTER_NAME"`
          # rather than using `--network host` (see the script's own header
          # comment for why).
          CLUSTER_NAME: htp-k8s-e2e
        run: ./test/e2e/container-kubeconfig/run.sh

      # ADR-0004's "modest" tier: layer a KWOK controller plus a handful of fake
      # Nodes and ~30 fake Pods (varied phases) onto the single real kind node,
      # so the screenshot/video below show a populated multi-tower scene rather
      # than one lone tower (issue #57). Reuses the vendored KWOK manifests from
      # the #5 harness. Full scale (50+ nodes) stays in the nightly job (#29).
      # Runs before the Playwright step so the objects exist when the app lists
      # them on /ws connect.
      #
      # This is a HARD correctness gate, not a best-effort nicety: seed.sh
      # asserts the populated end state (all fake nodes Ready, all pods in their
      # intended phases) and exits non-zero if it can't be established in time,
      # which fails the e2e job. Maintainer decision — a robust, populated test
      # scene is required; we do NOT silently degrade to the bare single-node
      # cluster and report green.
      - name: Seed modest KWOK nodes/pods
        run: ./test/e2e/kwok/seed.sh

      - name: Run Playwright e2e suite
        env:
          # Deliberately non-default: CI must not exercise the one port
          # (8080) a regression to a hardcoded ws://localhost:8080/ws would
          # still pass on (issue #146 — the frontend now derives its /ws/
          # /api target from window.location, so any port must work).
          HTP_K8S_E2E_PORT: "8099"
        run: task web:e2e

      # Screenshots, video, and traces are the visual proof of behavior
      # (ADR-0004) — always upload them, pass or fail, so they are retrievable
      # from the PR.
      - name: Upload e2e results (screenshots, video, traces)
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-e2e-results
          path: web/e2e-results/
          if-no-files-found: warn

      - name: Upload Playwright HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: web/playwright-report/
          if-no-files-found: ignore

  container-scan:
    name: Container scan (Trivy)
    # Skipped on docs-only PRs (issue #76) — see the integration/changes jobs.
    # The nightly full-suite backstop (issue #29) still scans against the live
    # Trivy vuln DB regardless of PR paths, so a docs-only stretch can't hide a
    # newly-published CVE.
    needs: changes
    if: ${{ needs.changes.outputs.nondocs == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      # Required to upload the SARIF results to the GitHub Security tab so
      # findings annotate the PR (ADR-0005).
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          check-latest: true

      - name: Set up ko
        uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      # Build a throwaway image into the local Docker daemon (no registry
      # push). The committed placeholder internal/server/dist/index.html lets
      # the go:embed succeed without a frontend build — enough to produce an
      # image for CVE scanning. The proper ko/GoReleaser release build is a
      # separate ticket (#30).
      - name: Build local container image (ko)
        id: build
        env:
          KO_DOCKER_REPO: ko.local
        run: |
          # --local loads the image into the runner's Docker daemon and prints
          # its reference (e.g. ko.local/htp-k8s-<hash>@sha256:...) to stdout.
          image="$(ko build --local ./cmd/htp-k8s)"
          echo "Built image: ${image}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      # FINDINGS are non-blocking but a scan OPERATIONAL failure fails the check
      # — matching release.yml since #69/#70. exit-code "0" makes Trivy exit 0
      # when it *finds* vulnerabilities (Criticals included) so CVEs never fail
      # the PR; and with NO continue-on-error, a genuine scan *error* — auth/401,
      # image-pull, DB download, hang — exits non-zero and turns the
      # Container scan (Trivy) check RED, rather than passing off a
      # silently-empty security report. Rationale: catch a broken scan in the PR
      # rather than being surprised by it at release.
      #
      # The step-level timeout-minutes (#70) bounds a setup hang — the trivy
      # binary/DB download stall observed on #67 — so it fails fast instead of
      # stalling to the job timeout; with continue-on-error gone, that timeout
      # then correctly fails the check (same class as the Playwright-install
      # timeout in #66/#68). trivy-action is a `uses:` step, so the timeout is
      # the clean guard here (a shell retry loop can't wrap the action directly).
      - name: Trivy scan (findings non-blocking)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        timeout-minutes: 5
        with:
          image-ref: ${{ steps.build.outputs.image }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          ignore-unfixed: false

      # No continue-on-error and no if: always() — this runs only after the scan
      # above succeeds, and a failed upload fails the job. The invariant: a real
      # SARIF lands in the Security tab, or the Container scan (Trivy) check goes
      # red. (Mirrors the release.yml upload.)
      - name: Upload Trivy SARIF to Security tab
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
