version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    # Default Dependabot inference produces "chore(deps): …", which
    # .goreleaser.yaml's changelog `exclude` filters strip from release
    # notes (`^chore(\(.*\))?:`) — a CVE-fixing bump would ship silently
    # absent from what a reader sees. "build" is not in that exclude list
    # (verified against the filters in .goreleaser.yaml). `include: scope`
    # keeps the (deps)/(deps-dev) suffix Dependabot already appends, so
    # bumps land as "build(deps): …" / "build(deps-dev): …" — visible,
    # and still distinguishing shipped-code from dev-only deps. See
    # issue #142.
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      gomod-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    # Same reasoning as the gomod entry above — see issue #142.
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 5
      semver-patch-days: 5
      semver-minor-days: 7
      semver-major-days: 14

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Same reasoning as the gomod entry above. This ecosystem landed in
    # #145 the same day as #142's decision, so #142's decision text
    # (which names only gomod/npm) predates it and missed it — a
    # historical omission, not a deliberate exclusion. Without this,
    # github-actions bumps still default to "chore(deps): …" and stay
    # excluded from release notes, despite being real supply-chain
    # changes in a repo that SHA-pins every action.
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
