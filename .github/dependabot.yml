version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    # Default Dependabot inference produces "chore(deps): …", which
    # .goreleaser.yaml's changelog `exclude` filters strip from release
    # notes (`^chore(\(.*\))?:`) — a CVE-fixing bump would ship silently
    # absent from what a reader sees. "build" is not in that exclude list
    # (verified against the filters in .goreleaser.yaml), so bumps stay
    # visible. See issue #142.
    commit-message:
      prefix: "build"
    groups:
      gomod-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    # Same reasoning as the gomod entry above — see issue #142.
    commit-message:
      prefix: "build"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    cooldown:
      default-days: 5
      semver-patch-days: 5
      semver-minor-days: 7
      semver-major-days: 14

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
