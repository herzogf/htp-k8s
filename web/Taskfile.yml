# Frontend build orchestration (web/ only).
#
# Included by the root Taskfile (as the `web:` namespace), which drives a
# single `task build`/`task test` across both this frontend and the Go
# backend (issue #4). These targets can still be run directly from within
# web/, or via `task --taskfile web/Taskfile.yml build`.
version: '3'

silent: true

tasks:
  install:
    desc: Install frontend dependencies
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm ci

  dev:
    desc: Run the Vite dev server
    deps: [install]
    cmds:
      - npm run dev

  build:
    desc: Typecheck and build the production frontend bundle
    deps: [install]
    cmds:
      - npm run build

  lint:
    desc: Lint and check formatting (ESLint + Prettier)
    deps: [install]
    cmds:
      - npm run lint

  test:
    desc: Run the Vitest suite
    deps: [install]
    cmds:
      - npm test
