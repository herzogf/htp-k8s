# GoReleaser configuration for htp-k8s (issue #30).
#
# Produces, on a git-tag push, a GitHub Release carrying: cross-platform Go
# binaries, a checksums.txt, an auto-generated changelog, and a Syft-generated
# CycloneDX SBOM per archive (ADR-0005 supply-chain posture). The container
# image is built separately with `ko` (see .ko.yaml) — GoReleaser owns the
# binaries/archives here, ko owns the image.
#
# NOT configured here (deliberately): GitHub-native artifact attestation
# (actions/attest-*) and Trivy release scanning — those are issue #31, layered
# on top in the release workflow, not GoReleaser blocks. No cosign signing
# block either: ADR-0005 chose GitHub's keyless OIDC attestation over
# GoReleaser's own signing to avoid two overlapping mechanisms.
#
# Verify locally without publishing anything:
#   task release:snapshot      # -> goreleaser release --snapshot --clean
#
# NOTE: `--snapshot` skips the whole publish stage (`--skip=announce,publish,
# validate`), and both the changelog AND `release.header`/`release.footer` are
# only rendered inside that publish stage (see internal/pipe/release/body.go
# in the goreleaser source) — so a snapshot run never touches them, even
# though it happily builds/archives/SBOMs. To actually exercise the release
# notes (including the footer, issue #99) either cut a real `vX.Y.Z-rc.N`
# prerelease tag through the real workflow (draft, not `latest` — delete it
# after) or render the Go template standalone against representative field
# values to check its output before committing to it.
#
# The single binary embeds the frontend via go:embed (ADR-0001); the `before`
# hook below runs `task release:frontend` so every archived binary carries the
# real built UI, not the committed placeholder.
version: 2

project_name: htp-k8s

before:
  hooks:
    # Build + embed the frontend (codegen -> vite build -> copy into
    # internal/server/dist) so the compiled binaries embed the real UI.
    - task release:frontend

builds:
  - id: htp-k8s
    main: ./cmd/htp-k8s
    binary: htp-k8s
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    # Strip debug info and inject build metadata into main.{version,commit,date}
    # so the released binary self-reports via `htp-k8s version` / `--version`.
    ldflags:
      - -s
      - -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: htp-k8s
    # tar.gz everywhere except Windows, which gets a zip.
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Auto-generated changelog from git history between tags. Uses git (not the
# GitHub API) so it needs no token and works offline. NOTE: GoReleaser skips
# the changelog during `--snapshot` (release notes are a publish-stage concern);
# it is generated on a real tag push. `goreleaser check` validates this block.
changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

# Syft-generated SBOM, one per archive, in CycloneDX JSON (ADR-0005). Requires
# the `syft` binary on PATH.
sboms:
  - id: cyclonedx
    artifacts: archive
    cmd: syft
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"
    documents:
      - "${artifact}.cyclonedx.sbom.json"

release:
  # owner/repo are inferred from the git remote — no need to hardcode them.
  # Publish as a draft so a human reviews the assets before it goes live; the
  # release is only ever created on an explicit tag push (see release.yml).
  draft: true
  prerelease: auto

  # The GitHub Release page lists binaries/checksums/SBOMs as ASSETS, but the
  # container image is not one — it's built separately by `ko` (see .ko.yaml)
  # and pushed straight to GHCR, so it never shows up there on its own
  # (issue #99). This footer is the only place in the generated release notes
  # that tells a reader the image exists at all.
  #
  # Deliberately by TAG, never by digest: GoReleaser (this file) and ko
  # (release.yml's separate `image` job) are two independent jobs that both
  # only `need: verify-green-commit` — they run in parallel, not sequentially
  # — so at the point GoReleaser renders this footer and creates the (draft)
  # release, the image's digest doesn't exist yet to template in. The release
  # stays a draft until a human publishes it, by which point both jobs have
  # finished and the tag resolves.
  #
  # Content is deliberately scoped to what release.yml/ADR-0005 actually ship
  # today: multi-arch pull/run + build-provenance verification (the index-level
  # `attest-build-provenance` from the `image` job) for BOTH the image and the
  # release binaries (issue #99 explicitly asks for the binary line too, to
  # cover the whole supply chain in one place — command mirrors README.md's
  # existing one). It does NOT claim an image SBOM (the `sboms` block below
  # only covers archives — see issue #98) and does NOT show a `cosign verify`
  # example (no bare cosign signature is emitted yet — that's issue #100 to
  # decide). The `docker run` line mirrors the README's current "real network
  # address" example (explicit `-e KUBECONFIG`, plus the README's `# then open
  # http://localhost:8080` follow-up so the reader has a next step); issue
  # #113 may change the KUBECONFIG default. Deliberately NOT copying the
  # README's local-cluster recipes (`--network kind`+`--internal` for kind,
  # `--network host` for k3d/minikube/Docker Desktop) here — a release-notes
  # reader is more likely pointing at a remote/real cluster than a local one
  # on the same host, so it'd be noise for the likelier reader here (unlike
  # the README's Quickstart, which leads with a local kind cluster).
  #
  # DOES copy the README's `--user "$(id -u):$(id -g)"` flag (issue #128) and
  # `-e HTP_K8S_ADDR=:8080` (issue #127): a standard kind/kubectl-written
  # kubeconfig is mode 0600 and this footer's command mounts it read-only into
  # a fixed-non-root-uid container exactly like the README's does, and
  # `defaultAddr` in cmd/htp-k8s/main.go is loopback-only for the same reason
  # the README's is — so a release-notes reader copy-pasting this footer needs
  # both fixes too. This binds `-p 127.0.0.1:8080:8080` (loopback), not a bare
  # `-p 8080:8080` (all interfaces) — this footer is the copy-paste surface
  # for every release reader, so it gets the safer form; zero usability cost,
  # since the next line already says `http://localhost:8080`.
  #
  # The shipped parenthetical right after the command is deliberately terse
  # (maintainer feedback on PR #132: the README's Quickstart had grown a full
  # paragraph of "why" per flag across several review rounds — cut back there
  # to commands + minimal orientation, with the "why" moved to
  # docs/running-locally.md and docs/adr/0012-secure-by-default-network-
  # binding.md, issue #127's ADR, added separately in PR #134). This footer
  # follows the same discipline and links out to both rather than restating
  # their content — don't re-inflate it; if a future flag needs explaining
  # here, add a short pointer, not a paragraph.
  #
  # `--signer-workflow` on both `gh attestation verify` calls: `--repo` alone
  # only proves SOME workflow in this repo produced the attestation, not
  # specifically `release.yml` — the prose right below the commands claims the
  # latter, so the flag is there to make that claim actually true, not just
  # plausible.
  #
  # Verification is by TAG, which resolves at verify time — a pass proves "an
  # artifact built by this repo's release.yml", not "the artifact THIS
  # release described" (that would need the tag to be immutable, which it
  # only is by convention). Narrow in practice (exploiting it needs GHCR
  # `packages: write`, and only permits repointing to another legitimately
  # attested htp-k8s build, i.e. a downgrade) and acceptable for an exact
  # version tag — but worth one sentence pointing a reader who wants the
  # stronger guarantee at the digest both commands print. Do NOT copy this
  # tag-based pattern onto a moving tag (e.g. a future `major`/`major.minor`
  # tag, issue #64) without a digest-pinning instruction — there, tag
  # mutability is the norm, not a convention-backed exception.
  # NOTE the leading blank line: GoReleaser's body template joins the
  # changelog and this footer with exactly ONE newline (see
  # internal/pipe/release/body.go), so a footer starting directly with `---`
  # would sit right under the changelog's last paragraph line with no blank
  # line between them — CommonMark then reads that as a setext H2 underline
  # (turning the changelog's last line into a heading) instead of the
  # intended horizontal rule. The blank line here restores the gap so `---`
  # renders as a thematic break, verified by rendering the full body
  # (changelog + footer) through Go's text/template, matching GoReleaser's
  # own template+options exactly (see the PR for #99).
  footer: |

    ---

    ### Container image

    Multi-arch (`linux/amd64`, `linux/arm64`), published to GHCR — this is **not** a release asset, it lives in [GHCR (Packages)](https://github.com/herzogf/htp-k8s/pkgs/container/htp-k8s):

    ```bash
    docker pull ghcr.io/herzogf/htp-k8s:{{ .Tag }}
    ```

    Run it:

    ```bash
    docker run --rm -p 127.0.0.1:8080:8080 \
      --user "$(id -u):$(id -g)" \
      -e KUBECONFIG=/kube/config \
      -e HTP_K8S_ADDR=:8080 \
      -v "$HOME/.kube/config:/kube/config:ro" \
      ghcr.io/herzogf/htp-k8s:{{ .Tag }}
    # then open http://localhost:8080
    ```

    (`--user "$(id -u):$(id -g)"` reads your `0600` kubeconfig; `-e HTP_K8S_ADDR=:8080` is required because `-p` doesn't reach the container's own loopback. Details and caveats (Windows, root shells): [Running & developing locally](https://github.com/herzogf/htp-k8s/blob/main/docs/running-locally.md#the-container-image); design reasoning: [ADR-0012](https://github.com/herzogf/htp-k8s/blob/main/docs/adr/0012-secure-by-default-network-binding.md).)
    {{- if not .Prerelease }}

    `:latest` also points at this release.
    {{- end }}

    Verify build provenance (keyless, Sigstore-backed — no keys to manage) — for the image, and for any release binary you downloaded:

    ```bash
    gh attestation verify oci://ghcr.io/herzogf/htp-k8s:{{ .Tag }} --repo herzogf/htp-k8s --signer-workflow herzogf/htp-k8s/.github/workflows/release.yml

    # adjust the filename to the platform you downloaded
    gh attestation verify htp-k8s_{{ .Version }}_linux_amd64.tar.gz --repo herzogf/htp-k8s --signer-workflow herzogf/htp-k8s/.github/workflows/release.yml
    ```

    A passing check means the artifact was built by this repo's `release.yml` workflow and hasn't been tampered with since. Both commands print the resolved digest — pin `@sha256:…` instead of the tag if you need that guarantee to hold even if this tag were ever repointed. More on the posture: [ADR-0005](https://github.com/herzogf/htp-k8s/blob/main/docs/adr/0005-supply-chain-security-posture.md).

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"
