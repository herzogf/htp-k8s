# ADR-0011 layer-3 authoritative video capture harness (issue #120).
#
# Included by the root Taskfile as the `capture:` namespace, alongside the
# `web:` namespace (see the root Taskfile.yml and web/Taskfile.yml for the
# same pattern).
version: '3'

silent: true

tasks:
  test:
    desc: >
      Run the permanent Vitest regression suite for this tool's pure math
      (issue #120): frame-timing (no playback-speed drift), pose-trace
      analysis (strongest turns, the required 0.3s saturation-cluster merge,
      fixture-pinned against a real recorded capture), and quaternion
      yaw/unwrap (wrap-around correctness). Unlike `record`, this IS part of
      the regular test suite and DOES run in CI (see .github/workflows/build.yml's
      Frontend (Node) job) — it's plain Node math with no browser/cluster
      involved, so it's cheap enough to run on every PR.
      Reuses web/node_modules via the same runtime-only symlink `record` (via
      run.sh) creates, since these scripts have no dependencies of their own;
      requires `task web:install` (or `npm ci` in web/) to have been run
      first. Shares run.sh's exact guarded create/remove lifecycle for that
      symlink (lib/node-modules-symlink.sh, issue #130) — removed on both the
      happy path and via the trap below, matching `record`'s own discipline;
      concurrent `capture:record`/`capture:test` runs remain unsupported
      (see that file's header comment).
    cmds:
      # Explicit `bash -c` (rather than Task's default POSIX-ish `sh`
      # interpreter, which rejects this multi-signal `trap ... EXIT INT TERM
      # HUP` with "invalid signal specification") — matches run.sh, which
      # this task shares its symlink helper with and is itself a bash script.
      - |
        bash -c '
          set -euo pipefail
          source "{{.TASKFILE_DIR}}/lib/node-modules-symlink.sh"
          LINK="{{.TASKFILE_DIR}}/node_modules"
          WEB_NODE_MODULES="{{.TASKFILE_DIR}}/../../../web/node_modules"
          trap "remove_capture_node_modules_symlink \"${LINK}\"" EXIT INT TERM HUP
          create_capture_node_modules_symlink "${LINK}" "${WEB_NODE_MODULES}"
          cd "{{.TASKFILE_DIR}}"
          node_modules/.bin/vitest run
        '

  record:
    desc: >
      ADR-0011 layer-3 authoritative video capture: builds the real binary,
      spins up a throwaway kind+KWOK cluster, captures a raw CDP screencast
      (not Playwright's built-in recorder — see docs/running-locally.md for
      why) of a Demo Mode flight at full fidelity, encodes it, and analyzes
      the pose trace (strongest turns, yaw-rate saturation clusters, tower
      proximity, labeled stills). Tears down the cluster/app process and
      deletes the raw JPEG frame cache when done. Override seed/duration/
      viewport/output directory with HTP_K8S_CAPTURE_* env vars — see
      test/e2e/capture/run.sh's header comment or docs/running-locally.md.
      Use this before merging a feel-changing PR (camera/animation/aesthetic
      work); it is NOT part of the regular test suite and is never run in CI.
    cmds:
      - ./run.sh
